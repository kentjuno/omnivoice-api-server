<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniVoice TTS Playground</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f1115;
            --card-dark: #161a22;
            --accent: #2ec4b6;
            --accent-hover: #20a396;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #2a313e;
            --glass-bg: rgba(22, 26, 34, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.2s ease-in-out;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(at 10% 20%, rgba(46, 196, 182, 0.05) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(32, 163, 150, 0.05) 0px, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ef4444;
        }

        .status-dot.online {
            background-color: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        /* Mode Tabs */
        .tabs-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            border-radius: 8px;
            text-align: center;
        }

        .tab-btn.active {
            background-color: var(--card-dark);
            color: var(--accent);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* Form Layout */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea {
            width: 100%;
            height: 100px;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            color: var(--text-main);
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(46, 196, 182, 0.1);
        }

        input, select {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
            font-family: inherit;
        }

        input:focus, select:focus {
            border-color: var(--accent);
        }

        /* Mode Panels */
        .mode-panel {
            display: none;
            background: rgba(0, 0, 0, 0.1);
            border: 1px dashed var(--border-color);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        .mode-panel.active {
            display: block;
        }

        .instruct-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }

        @media (max-width: 600px) {
            .instruct-grid {
                grid-template-columns: 1fr;
            }
        }

        /* File Upload styling */
        .upload-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .file-input-wrapper {
            position: relative;
            flex: 1;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-custom-btn {
            display: block;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .file-custom-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        /* Parameters Section */
        .adv-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--accent);
            cursor: pointer;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .adv-header::after {
            content: '▼';
            font-size: 0.65rem;
        }

        .adv-header.open::after {
            content: '▲';
        }

        .adv-content {
            display: none;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            margin-bottom: 20px;
        }

        .adv-content.show {
            display: block;
        }

        .params-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 600px) {
            .params-grid {
                grid-template-columns: 1fr;
            }
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-group input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .slider-val {
            font-family: monospace;
            font-size: 0.9rem;
            width: 35px;
            text-align: right;
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .checkbox-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* Trigger Button */
        .actions {
            margin-top: 25px;
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            color: #0f1115;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 196, 182, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 196, 182, 0.35);
        }

        .btn:disabled {
            background: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(15, 17, 21, 0.2);
            border-radius: 50%;
            border-top-color: #0f1115;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Results Box */
        .player-panel {
            display: none;
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .player-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--accent);
            font-size: 0.95rem;
        }

        audio {
            width: 100%;
            outline: none;
        }

        .error-message {
            display: none;
            margin-top: 15px;
            background-color: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            animation: fadeIn 0.2s ease;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>OmniVoice TTS Playground</h1>
        <div class="status-badge">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Đang kiểm tra kết nối...</span>
        </div>
    </header>

    <!-- Main Text Input -->
    <div class="form-group">
        <label for="text-input">Văn bản thuyết minh (Text Prompt)</label>
        <textarea id="text-input" placeholder="Nhập văn bản cần thuyết minh tiếng Việt tại đây... Nhớ chèn các tag cảm xúc như [laughter] hoặc [sigh] nếu muốn giọng sinh động hơn.">Xin chào nha ní! Đây là giọng thuyết minh thử nghiệm, chạy hoàn toàn offline bằng server OmniVoice.</textarea>
    </div>

    <!-- Mode Tabs -->
    <div class="tabs-nav">
        <button class="tab-btn active" id="tab-btn-instruct" onclick="switchMode('instruct')">Thiết kế giọng (Voice Design)</button>
        <button class="tab-btn" id="tab-btn-clone" onclick="switchMode('clone')">Clone giọng mẫu (Voice Cloning)</button>
    </div>

    <!-- Mode Panel 1: Instruct (Voice Design) -->
    <div class="mode-panel active" id="panel-instruct">
        <div class="instruct-grid">
            <div class="form-group">
                <label for="gender-select">Giới tính & Lứa tuổi</label>
                <select id="gender-select" onchange="updateInstructValue()">
                    <option value="female">Nữ thanh niên (female)</option>
                    <option value="male">Nam thanh niên (male)</option>
                    <option value="child">Trẻ em (child)</option>
                    <option value="teenager">Thiếu niên (teenager)</option>
                    <option value="middle-aged">Trung niên (middle-aged)</option>
                    <option value="elderly">Người cao tuổi (elderly)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="pitch-select">Tông giọng (Pitch)</label>
                <select id="pitch-select" onchange="updateInstructValue()">
                    <option value="moderate pitch">Trung bình (moderate pitch)</option>
                    <option value="high pitch">Cao (high pitch)</option>
                    <option value="very high pitch">Rất cao (very high pitch)</option>
                    <option value="low pitch">Trầm (low pitch)</option>
                    <option value="very low pitch">Rất trầm (very low pitch)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="style-select">Đặc tính giọng đọc</label>
                <select id="style-select" onchange="updateInstructValue()">
                    <option value="">Bình thường (normal)</option>
                    <option value="whisper">Thì thầm (whisper)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="accent-select">Giọng điệu vùng miền (Accent)</label>
                <select id="accent-select" onchange="updateInstructValue()">
                    <option value="">Không (mặc định)</option>
                    <option value="american accent">Mỹ (american accent)</option>
                    <option value="british accent">Anh (british accent)</option>
                    <option value="australian accent">Úc (australian accent)</option>
                    <option value="chinese accent">Trung Quốc (chinese accent)</option>
                    <option value="japanese accent">Nhật (japanese accent)</option>
                    <option value="korean accent">Hàn (korean accent)</option>
                    <option value="indian accent">Ấn Độ (indian accent)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="instruct-input">Lệnh thiết kế giọng đọc hoàn chỉnh (Instruct Prompt)</label>
            <input type="text" id="instruct-input" value="female, moderate pitch" placeholder="Mô tả thuộc tính cách nhau bằng dấu phẩy...">
        </div>
    </div>

    <!-- Mode Panel 2: Clone (Voice Cloning) -->
    <div class="mode-panel" id="panel-clone">
        <div class="form-group">
            <label for="voice-file-select">Chọn file giọng mẫu có sẵn trong server</label>
            <select id="voice-file-select">
                <option value="">-- Chưa tải file nào lên --</option>
            </select>
        </div>

        <div class="form-group">
            <label>Hoặc Tải lên file giọng mẫu mới (.wav, .mp3)</label>
            <div class="upload-row">
                <div class="file-input-wrapper">
                    <span class="file-custom-btn" id="file-lbl">Chọn file âm thanh mẫu...</span>
                    <input type="file" id="file-uploader" accept=".wav,.mp3,.ogg,.flac" onchange="handleFileUpload(this)">
                </div>
            </div>
        </div>
    </div>

    <!-- Advanced Section Toggle -->
    <div class="adv-header" id="adv-toggle" onclick="toggleAdvanced()">Tham số âm thanh nâng cao</div>

    <!-- Advanced Content Panel -->
    <div class="adv-content" id="adv-panel">
        <div class="params-grid">
            <div class="form-group">
                <label for="speed-range">Tốc độ nói (Speed)</label>
                <div class="slider-group">
                    <input type="range" id="speed-range" min="0.5" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('speed-val').innerText = this.value">
                    <span class="slider-val" id="speed-val">1.0</span>
                </div>
            </div>

            <div class="form-group">
                <label for="guidance-range">Độ bám sát Instruct (Guidance Scale)</label>
                <div class="slider-group">
                    <input type="range" id="guidance-range" min="1.0" max="10.0" step="0.5" value="2.0" oninput="document.getElementById('guidance-val').innerText = this.value">
                    <span class="slider-val" id="guidance-val">2.0</span>
                </div>
            </div>

            <div class="form-group">
                <label for="steps-range">Số bước khuếch đại (Inference Steps)</label>
                <div class="slider-group">
                    <input type="range" id="steps-range" min="10" max="100" step="2" value="32" oninput="document.getElementById('steps-val').innerText = this.value">
                    <span class="slider-val" id="steps-val">32</span>
                </div>
            </div>

            <div class="form-group">
                <label for="lang-select">Ngôn ngữ thuyết minh</label>
                <select id="lang-select">
                    <option value="vi">Tiếng Việt (vi)</option>
                    <option value="en">Tiếng Anh (en)</option>
                    <option value="zh">Tiếng Trung (zh)</option>
                    <option value="auto">Tự động (Auto)</option>
                </select>
            </div>
        </div>

        <div class="checkbox-group">
            <label class="checkbox-item">
                <input type="checkbox" id="denoise-chk" checked> Dọn nhiễu nền (Denoise)
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="postprocess-chk" checked> Hậu xử lý âm thanh (Postprocess)
            </label>
        </div>
    </div>

    <!-- Action Button -->
    <div class="actions">
        <button class="btn" id="generate-btn" disabled>
            <span class="spinner" id="btn-spinner"></span>
            <span id="btn-text">BẮT ĐẦU CHUYỂN GIỌNG NÓI (GENERATE TTS)</span>
        </button>
    </div>

    <!-- Error Display Box -->
    <div class="error-message" id="error-box">Lỗi kết nối server</div>

    <!-- Audio Output Box -->
    <div class="player-panel" id="player-box">
        <div class="player-header">
            <span class="player-title">🔊 Kết Quả Giọng Nói Thuyết Minh:</span>
            <a href="#" id="download-link" style="color: var(--accent); font-size: 0.9rem; text-decoration: none;" download="speech_output.wav">Tải file (.wav)</a>
        </div>
        <audio id="audio-player" controls></audio>
    </div>
</div>

<script>
    const serverUrl = window.location.origin;
    let activeMode = 'instruct';

    // Elements
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const textInput = document.getElementById('text-input');
    const generateBtn = document.getElementById('generate-btn');
    const btnSpinner = document.getElementById('btn-spinner');
    const btnText = document.getElementById('btn-text');
    const errorBox = document.getElementById('error-box');
    const playerBox = document.getElementById('player-box');
    const audioPlayer = document.getElementById('audio-player');
    const downloadLink = document.getElementById('download-link');

    // Advanced toggle
    function toggleAdvanced() {
        const header = document.getElementById('adv-toggle');
        const panel = document.getElementById('adv-panel');
        header.classList.toggle('open');
        panel.classList.toggle('show');
    }

    // Switch Tabs (Design vs Clone)
    function switchMode(mode) {
        activeMode = mode;
        
        // Update Buttons
        document.getElementById('tab-btn-instruct').classList.toggle('active', mode === 'instruct');
        document.getElementById('tab-btn-clone').classList.toggle('active', mode === 'clone');

        // Update Panels
        document.getElementById('panel-instruct').classList.toggle('active', mode === 'instruct');
        document.getElementById('panel-clone').classList.toggle('active', mode === 'clone');
    }

    // Dynamic Instruct prompt concatenation
    function updateInstructValue() {
        const gender = document.getElementById('gender-select').value;
        const pitch = document.getElementById('pitch-select').value;
        const style = document.getElementById('style-select').value;
        const accent = document.getElementById('accent-select').value;

        let parts = [gender, pitch];
        if (style) parts.push(style);
        if (accent) parts.push(accent);

        document.getElementById('instruct-input').value = parts.join(', ');
    }

    // Initial trigger
    updateInstructValue();

    // Health Monitor & Voices Loader
    async function checkHealth() {
        try {
            const resp = await fetch(`${serverUrl}/health`);
            const data = await resp.json();
            if (data.status === 'ok') {
                statusDot.classList.add('online');
                statusText.innerText = 'Server Sẵn Sàng (Model Loaded)';
                generateBtn.disabled = false;
            } else {
                statusDot.classList.remove('online');
                statusText.innerText = 'Đang tải model vào RAM... Vui lòng đợi.';
                generateBtn.disabled = true;
            }
        } catch (e) {
            statusDot.classList.remove('online');
            statusText.innerText = 'Không thể kết nối tới Server (Offline)';
            generateBtn.disabled = true;
        }
    }

    async function loadVoices() {
        try {
            const resp = await fetch(`${serverUrl}/api/voices`);
            const data = await resp.json();
            const select = document.getElementById('voice-file-select');
            
            // Retain selected item if possible
            const selectedVal = select.value;
            select.innerHTML = '';

            if (data.voices && data.voices.length > 0) {
                data.voices.forEach(v => {
                    const option = document.createElement('option');
                    // Remove extension for display, but keep value intact
                    const baseName = v.substring(0, v.lastIndexOf('.')) || v;
                    option.value = baseName;
                    option.innerText = `${baseName} (${v.substring(v.lastIndexOf('.') + 1).toUpperCase()})`;
                    select.appendChild(option);
                });
                
                if (selectedVal && data.voices.includes(selectedVal)) {
                    select.value = selectedVal;
                }
            } else {
                select.innerHTML = '<option value="">-- Chưa tải file nào lên (voices/) --</option>';
            }
        } catch (e) {
            console.error("Failed to load voices list: ", e);
        }
    }

    // File Upload Handler
    async function handleFileUpload(input) {
        const file = input.files[0];
        if (!file) return;

        document.getElementById('file-lbl').innerText = `Đang tải: ${file.name}...`;
        
        const formData = new FormData();
        formData.append('file', file);

        try {
            const resp = await fetch(`${serverUrl}/api/upload-ref`, {
                method: 'POST',
                body: formData
            });

            if (resp.ok) {
                const res = await resp.json();
                document.getElementById('file-lbl').innerText = `Đã tải lên: ${res.filename}`;
                
                // Reload list and select the new file name (without extension as it maps to voice_id)
                await loadVoices();
                const baseName = res.filename.substring(0, res.filename.lastIndexOf('.')) || res.filename;
                document.getElementById('voice-file-select').value = baseName;
            } else {
                const err = await resp.json();
                alert(`Tải file thất bại: ${err.detail || 'Lỗi mạng'}`);
                document.getElementById('file-lbl').innerText = 'Chọn file âm thanh mẫu...';
            }
        } catch (e) {
            alert(`Lỗi kết nối tải file: ${e.message}`);
            document.getElementById('file-lbl').innerText = 'Chọn file âm thanh mẫu...';
        }
    }

    // Run health check initially and poll
    checkHealth();
    loadVoices();
    setInterval(checkHealth, 5000);

    // Generate Audio Trigger
    generateBtn.addEventListener('click', async () => {
        const text = textInput.value.trim();
        if (!text) {
            alert('Vui lòng nhập nội dung văn bản!');
            return;
        }

        playerBox.style.display = 'none';
        errorBox.style.display = 'none';

        // Set Loading State
        generateBtn.disabled = true;
        btnSpinner.style.display = 'block';
        btnText.innerText = 'Đang sinh thuyết minh (TTS inference)...';

        const payload = {
            text: text,
            language: document.getElementById('lang-select').value,
            speed: parseFloat(document.getElementById('speed-range').value),
            guidance_scale: parseFloat(document.getElementById('guidance-range').value),
            num_step: parseInt(document.getElementById('steps-range').value),
            denoise: document.getElementById('denoise-chk').checked,
            postprocess_output: document.getElementById('postprocess-chk').checked
        };

        if (activeMode === 'instruct') {
            payload.instruct = document.getElementById('instruct-input').value.trim();
            payload.voice_id = null;
        } else {
            const selectVal = document.getElementById('voice-file-select').value;
            if (!selectVal) {
                alert('Vui lòng chọn hoặc tải lên một file âm thanh mẫu trước khi clone!');
                generateBtn.disabled = false;
                btnSpinner.style.display = 'none';
                btnText.innerText = 'BẮT ĐẦU CHUYỂN GIỌNG NÓI (GENERATE TTS)';
                return;
            }
            payload.voice_id = selectVal;
            payload.instruct = null;
        }

        try {
            const response = await fetch(`${serverUrl}/v1/tts`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);
                
                audioPlayer.src = audioUrl;
                downloadLink.href = audioUrl;
                
                playerBox.style.display = 'block';
                audioPlayer.play();
            } else {
                const errData = await response.json();
                errorBox.innerText = `Thất bại: ${errData.detail || 'Lỗi không xác định'}`;
                errorBox.style.display = 'block';
            }
        } catch (err) {
            errorBox.innerText = `Lỗi mạng: Không thể kết nối API (${err.message})`;
            errorBox.style.display = 'block';
        } finally {
            generateBtn.disabled = false;
            btnSpinner.style.display = 'none';
            btnText.innerText = 'BẮT ĐẦU CHUYỂN GIỌNG NÓI (GENERATE TTS)';
        }
    });
</script>
</body>
</html>
